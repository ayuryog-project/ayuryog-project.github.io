---
layout: default
---
<div class="post-content">
  <div class="post-meta">
    <span class="post-date">{{ page.date | date: "%-d. %b. '%y" }}</span>
    {% if page.author %}<span class="post-author">{{ page.author }}</span>{% endif %}
  </div>
  <h1 class="post-title">{{ page.title }}</h1>
  {{ content }}
</div>
